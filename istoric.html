<!-- Păstrează tot stilul și tabelul HTML, apoi înlocuiește scriptul cu acesta -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApPbIf1cir53tQm01fBZYKTNsuTQXH7H4",
        authDomain: "valsocialconstruct-calculator.firebaseapp.com",
        databaseURL: "https://valsocialconstruct-calculator-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "valsocialconstruct-calculator",
        storageBucket: "valsocialconstruct-calculator.firebasestorage.app",
        messagingSenderId: "612758921733",
        appId: "1:612758921733:web:33c3dfe5b4e8d3b121326c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let tarife = [{id:'t9', pret: 9.6}, {id:'t10', pret: 10}]; // De preferat să le iei din Firebase și pe acestea ulterior

    const tbody = document.getElementById('tbodyIstoric');

    // Funcția de calcul rămâne la fel
    function calculeazaDate(l) {
        const oreTotale = (parseFloat(l.zile || 0) * 8) + parseFloat(l.oreE || 0);
        const costMotorina = oreTotale * 10 * 9.6; 
        const costOperator = parseFloat(l.zile || 0) * parseFloat(l.sal || 400);
        const totalCheltuieli = Math.round(costMotorina + costOperator);
        const recomandat = parseFloat(l.total.replace(/[^0-9]/g, ''));
        const negociat = l.negociat ? parseFloat(l.negociat) : recomandat;
        return { recomandat, negociat, totalCheltuieli, profit: negociat - totalCheltuieli };
    }

    // Ascultăm datele din Firebase în timp real
    const dbRef = ref(db, 'lucrari');
    onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        let rows = "";
        
        if (data) {
            // Transformăm obiectul Firebase în listă și îl sortăm (cele mai noi sus)
            const lista = Object.keys(data).map(key => ({ id: key, ...data[key] }));
            lista.sort((a, b) => b.timestamp - a.timestamp);

            lista.forEach(l => {
                const d = calculeazaDate(l);
                const currentStatus = l.status || 'In asteptare';
                rows += `
                    <tr>
                        <td>${l.data}</td>
                        <td><b>${l.client}</b><br><small>${l.locatie}</small></td>
                        <td>${d.recomandat} lei</td>
                        <td style="color:#d35400; font-weight:bold;">${d.negociat} lei</td>
                        <td style="color:#7f8c8d; font-style:italic;">${d.totalCheltuieli} lei</td>
                        <td style="font-weight:bold; color:${d.profit >= 0 ? '#27ae60' : '#e74c3c'}">${d.profit} lei</td>
                        <td>
                            <select class="status-select ${currentStatus === 'Confirmat' ? 'status-confirm' : 'status-pending'}" 
                                    onchange="window.schimbaStatus('${l.id}', this.value)">
                                <option value="In asteptare" ${currentStatus === 'In asteptare' ? 'selected' : ''}>⏳ În așteptare</option>
                                <option value="Confirmat" ${currentStatus === 'Confirmat' ? 'selected' : ''}>✅ Confirmat</option>
                            </select>
                        </td>
                        <td><button class="btn-delete-item" onclick="window.stergeRand('${l.id}')">X</button></td>
                    </tr>`;
            });
        }
        tbody.innerHTML = rows;
    });

    window.schimbaStatus = function(id, val) {
        update(ref(db, 'lucrari/' + id), { status: val });
    };

    window.stergeRand = function(id) {
        if(confirm("Ștergi definitiv lucrarea pentru toți utilizatorii?")) {
            remove(ref(db, 'lucrari/' + id));
        }
    };
</script>

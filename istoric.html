<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Istoric Lucrări - Val Social Construct</title>
    <style>
        :root { --primary: #d35400; --dark: #1a252f; --success: #27ae60; --danger: #e74c3c; --bg: #f0f2f5; --warning: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        nav { background: var(--dark); padding: 15px; display: flex; justify-content: center; gap: 10px; }
        nav a { color: white; text-decoration: none; padding: 8px 15px; border: 1px solid rgba(255,255,255,0.3); border-radius: 5px; }
        nav a.active { background: var(--primary); font-weight: bold; }
        .container { padding: 20px; max-width: 1200px; margin: 20px auto; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--dark); color: white; padding: 10px; text-align: left; font-size: 0.75em; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid #ddd; font-size: 0.85em; }
        .status-select { padding: 5px; border-radius: 4px; border: 1px solid #ccc; font-size: 0.8em; font-weight: bold; }
        .status-confirm { color: var(--success); border-color: var(--success); }
        .status-pending { color: var(--warning); border-color: var(--warning); }
        .profit-pozitiv { color: var(--success); font-weight: bold; }
        .profit-negativ { color: var(--danger); font-weight: bold; }
        .btn-delete-item { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <nav>
        <a href="calculator.html">Calculator</a>
        <a href="istoric.html" class="active">Istoric Lucrări</a>
        <a href="tarife.html">Tarife de Referință</a>
    </nav>
    <div class="container">
        <h1>📋 ISTORIC LUCRĂRI (CLOUD)</h1>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Client / Locație</th>
                        <th>Recomandat</th>
                        <th>Negociat</th>
                        <th>Cheltuieli</th>
                        <th>Profit</th>
                        <th>Status</th>
                        <th>Acțiuni</th>
                    </tr>
                </thead>
                <tbody id="tbodyIstoric"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApPbIf1cir53tQm01fBZYKTNsuTQXH7H4",
            authDomain: "valsocialconstruct-calculator.firebaseapp.com",
            databaseURL: "https://valsocialconstruct-calculator-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "valsocialconstruct-calculator",
            storageBucket: "valsocialconstruct-calculator.firebasestorage.app",
            messagingSenderId: "612758921733",
            appId: "1:612758921733:web:33c3dfe5b4e8d3b121326c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let tarife = [];
        onValue(ref(db, 'tarife'), (s) => { tarife = s.val() || []; });

        onValue(ref(db, 'lucrari'), (snapshot) => {
            const data = snapshot.val();
            const tbody = document.getElementById('tbodyIstoric');
            let rows = "";
            
            if (data) {
                const lista = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                lista.sort((a, b) => b.timestamp - a.timestamp);

                lista.forEach(l => {
                    const motorina = tarife.find(t => t.id === 't9')?.pret || 9.6;
                    const consum = tarife.find(t => t.id === 't10')?.pret || 10;
                    const ore = (parseFloat(l.zile || 0) * 8) + parseFloat(l.oreE || 0);
                    const costuri = Math.round((ore * consum * motorina) + (parseFloat(l.zile || 0) * parseFloat(l.sal || 400)));
                    
                    const rec = parseFloat(l.total.replace(/[^0-9]/g, ''));
                    const neg = l.negociat ? parseFloat(l.negociat) : rec;
                    const profit = neg - costuri;

                    rows += `
                        <tr>
                            <td>${l.data}</td>
                            <td><b>${l.client}</b><br><small>${l.locatie}</small></td>
                            <td>${rec} lei</td>
                            <td style="color:#d35400; font-weight:bold;">${neg} lei</td>
                            <td>${costuri} lei</td>
                            <td class="${profit >= 0 ? 'profit-pozitiv' : 'profit-negativ'}">${profit} lei</td>
                            <td>
                                <select class="status-select ${l.status === 'Confirmat' ? 'status-confirm' : 'status-pending'}" 
                                        onchange="window.schimbaStatus('${l.id}', this.value)">
                                    <option value="In asteptare" ${l.status === 'In asteptare' ? 'selected' : ''}>⏳ Așteptare</option>
                                    <option value="Confirmat" ${l.status === 'Confirmat' ? 'selected' : ''}>✅ Confirmat</option>
                                </select>
                            </td>
                            <td><button class="btn-delete-item" onclick="window.sterge('${l.id}')">X</button></td>
                        </tr>`;
                });
            }
            tbody.innerHTML = rows;
        });

        window.schimbaStatus = (id, val) => update(ref(db, 'lucrari/' + id), { status: val });
        window.sterge = (id) => confirm("Ștergi lucrarea?") && remove(ref(db, 'lucrari/' + id));
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Istoric - Val Social Construct</title>
    <style>
        :root { --primary: #d35400; --dark: #1a252f; --success: #27ae60; --danger: #e74c3c; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        nav { background: var(--dark); padding: 15px; display: flex; justify-content: center; gap: 10px; }
        nav a { color: white; text-decoration: none; padding: 8px 15px; border: 1px solid rgba(255,255,255,0.3); border-radius: 5px; }
        nav a.active { background: var(--primary); font-weight: bold; }
        
        .container { padding: 20px; max-width: 1000px; margin: 20px auto; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--dark); color: white; padding: 12px; text-align: left; font-size: 0.8em; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #ddd; font-size: 0.9em; cursor: pointer; }
        tr:hover { background: #f9f9f9; }
        
        .profit-pozitiv { color: var(--success); font-weight: bold; }
        .profit-negativ { color: var(--danger); font-weight: bold; }
        
        .btn-delete-item { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-del-all { background: #7f8c8d; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 25px; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <a href="calculator.html">Calculator</a>
        <a href="istoric.html" class="active">Istoric Lucrări</a>
        <a href="tarife.html">Tarife de Referință</a>
    </nav>
    <div class="container">
        <h1>📋 ISTORIC & PROFITABILITATE</h1>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Client / Locație</th>
                        <th>Serviciu</th>
                        <th>Încasat</th>
                        <th>Profit Net</th>
                        <th>Acțiuni</th>
                    </tr>
                </thead>
                <tbody id="tbodyIstoric"></tbody>
            </table>
        </div>
        <button class="btn-del-all" onclick="stergeTot()">GOLEȘTE TOT ISTORICUL</button>
    </div>

    <script>
        let istoric = JSON.parse(localStorage.getItem('vsc_istoric')) || [];
        let tarife = JSON.parse(localStorage.getItem('vsc_tarife')) || [];
        const tbody = document.getElementById('tbodyIstoric');

        function calculeazaProfit(lucrare) {
            // Extragere variabile din tarife (motorina si consum)
            const pretMotorina = tarife.find(t => t.id === 't9')?.pret || 9.6;
            const consumOra = tarife.find(t => t.id === 't10')?.pret || 10;
            
            // Calcul ore totale
            const oreTotale = (parseFloat(lucrare.zile || 0) * 8) + parseFloat(lucrare.oreE || 0);
            
            // Cheltuieli: (Consum motorina) + (Salariu operator pe zile)
            const costMotorina = oreTotale * consumOra * pretMotorina;
            const costOperator = parseFloat(lucrare.zile || 0) * parseFloat(lucrare.sal || 400);
            
            const totalCheltuieli = costMotorina + costOperator;
            const pretIncasat = parseFloat(lucrare.total.replace(/[^0-9]/g, ''));
            
            return Math.round(pretIncasat - totalCheltuieli);
        }

        function afiseazaTabel() {
            tbody.innerHTML = istoric.slice().reverse().map(l => {
                const profit = calculeazaProfit(l);
                const clasaProfit = profit >= 0 ? 'profit-pozitiv' : 'profit-negativ';
                
                return `
                    <tr onclick="editeaza(${l.id})">
                        <td>${l.data}</td>
                        <td><b>${l.client}</b><br><small>${l.locatie}</small></td>
                        <td>${l.tip.split('(')[0]}</td>
                        <td>${l.total}</td>
                        <td class="${clasaProfit}">${profit} lei</td>
                        <td>
                            <button class="btn-delete-item" onclick="stergeRand(event, ${l.id})">Șterge</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function editeaza(id) { 
            localStorage.setItem('vsc_edit_id', id); 
            window.location.href = 'calculator.html'; 
        }

        function stergeRand(event, id) {
            event.stopPropagation();
            if(confirm("Ștergi această înregistrare?")) {
                istoric = istoric.filter(item => item.id !== id);
                localStorage.setItem('vsc_istoric', JSON.stringify(istoric));
                afiseazaTabel();
            }
        }

        function stergeTot() { 
            if(confirm("Ștergi tot istoricul?")) { 
                localStorage.removeItem('vsc_istoric'); 
                istoric = [];
                afiseazaTabel(); 
            } 
        }

        afiseazaTabel();
    </script>
</body>
</html>

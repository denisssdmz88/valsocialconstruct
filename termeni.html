<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termeni și Condiții - VAL SOCIAL CONSTRUCT</title>
    <style>
        /* Reset de bază */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #ffffff;
        }

        /* Top Bar */
        .top-bar {
            background: #1a1a1a;
            color: white;
            padding: 10px 0;
            font-size: 0.9em;
        }

        .top-bar .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .contact-info {
            display: flex;
            gap: 20px;
        }

        .social-links {
            display: flex;
            gap: 15px;
        }

        .social-links a {
            color: white;
            text-decoration: none;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: #ffa500;
        }

        /* Navigation */
        nav {
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8em;
            font-weight: 700;
            color: #ffa500;
            padding: 20px 0;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-menu a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.3s;
            padding: 25px 0;
            display: block;
        }

        .nav-menu a:hover, .nav-menu a.active {
            color: #ffa500;
        }

        .cta-button {
            background: #ffa500;
            color: white;
            padding: 12px 30px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s;
        }

        .cta-button:hover {
            background: #ff8c00;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #1a1a1a 0%, #444 100%);
            color: white;
            padding: 80px 20px;
            text-align: center;
        }

        .hero h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        /* Main Content */
        .content-section {
            padding: 60px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .terms-content {
            max-width: 900px;
            margin: 0 auto;
        }

        .last-updated {
            background: #f8f9fa;
            padding: 15px 20px;
            border-left: 4px solid #ffa500;
            margin-bottom: 40px;
            color: #666;
        }

        h2 {
            color: #1a1a1a;
            font-size: 1.8em;
            margin-top: 40px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ffa500;
        }

        p {
            margin-bottom: 20px;
            line-height: 1.8;
            color: #555;
        }

        ul {
            margin-bottom: 20px;
            padding-left: 40px;
        }

        li {
            margin-bottom: 10px;
            color: #555;
        }

        /* Footer */
        footer {
            background: #1a1a1a;
            color: white;
            padding: 60px 20px 20px;
            margin-top: 40px;
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-section h3 {
            color: #ffa500;
            margin-bottom: 20px;
        }

        .footer-bottom {
            text-align: center;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 40px;
            color: #888;
        }

        /* Mobile */
        @media (max-width: 968px) {
            .nav-menu { display: none; }
        }
    </style>
</head>

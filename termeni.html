<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termeni și Condiții - VAL SOCIAL CONSTRUCT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        /* Top Bar */
        .top-bar {
            background: #1a1a1a;
            color: white;
            padding: 10px 0;
            font-size: 0.9em;
        }

        .top-bar .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .contact-info {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .social-links {
            display: flex;
            gap: 15px;
        }

        .social-links a {
            color: white;
            text-decoration: none;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: #ffa500;
        }

        /* Navigation */
        nav {
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8em;
            font-weight: 700;
            color: #ffa500;
            padding: 20px 0;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-menu a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.3s;
            padding: 25px 0;
            display: block;
        }

        .nav-menu a:hover, .nav-menu a.active {
            color: #ffa500;
        }

        .cta-button {
            background: #ffa500;
            color: white;
            padding: 12px 30px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s;
        }

        .cta-button:hover {
            background: #ff8c00;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #1a1a1a 0%, #444 100%);
            color: white;
            padding: 80px 20px;
            text-align: center;
        }

        .hero h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .breadcrumb {
            color: rgba(255,255,255,0.8);
            margin-top: 10px;
        }

        .breadcrumb a {
            color: white;
            text-decoration: none;
        }

        /* Main Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .content-section {
            padding: 60px 20px;
        }

        .terms-content {
            max-width: 900px;
            margin: 0 auto;
        }

        .last-updated {
            background: #f8f9fa;
            padding: 15px 20px;
            border-left: 4px solid #ffa500;
            margin-bottom: 40px;
            color: #666;
        }

        .terms-content h2 {
            color: #1a1a1a;
            font-size: 1.8em;
            margin-top: 40px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ffa500;
        }

        .terms-content h3 {
            color: #333;
            font-size: 1.3em;
            margin-top: 30px;
            margin-bottom: 15px;
        }

        .terms-content p, .terms-content li {
            color: #555;
            font-size: 1.05em;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .terms-content ul {
            margin: 20px 0;
            padding-left: 40px;
        }

        .important-note {
            background: #fff3cd;
            border-left: 4px solid #ffa500;
            padding: 20px;
            margin: 30px 0;
        }

        .important-note p {
            color: #856404;
            margin: 0;
            font-weight: 500;
        }

        /* Footer */
        footer {
            background: #1a1a1a;
            color: white;
            padding: 60px 20px 20px;
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 40px;
        }

        .footer-section h3 {
            color: #ffa500;
            margin-bottom: 20px;
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section li {
            margin-bottom: 10px;
        }

        .footer-section a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-section a:hover {
            color: #ffa500;
        }
